<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MunchBear | Coming Soon</title>
    <!-- Cloudflare Turnstile Script -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #0f172a;
            --accent-color: #4f46e5;
            --secondary-color: #475569;
            --error-color: #ef4444;
            --success-color: #10b981;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--secondary-color);
            margin-bottom: 2.5rem;
        }

        .form-wrapper {
            max-width: 480px;
            margin: 0 auto;
        }

        .notify-me {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 12px;
            transition: opacity 0.3s ease;
            align-items: center;
        }

        input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #f8fafc;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background-color: white;
        }

        input.invalid {
            border-color: var(--error-color);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .captcha-container {
            display: none; /* Shown when email is valid */
            width: 100%;
            margin: 10px auto 0;
            min-height: 65px;
            animation: slideDown 0.3s ease-out;
        }

        button {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06);
            white-space: nowrap;
        }

        button:hover {
            background-color: #4338ca;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2), 0 4px 6px -2px rgba(79, 70, 229, 0.1);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .thank-you {
            display: none;
            font-size: 1.25rem;
            color: var(--success-color);
            font-weight: 600;
            animation: fadeIn 0.5s ease-out;
        }

        /* Honeypot - Hidden from humans */
        .hp-field {
            position: absolute;
            left: -5000px;
            top: -5000px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.25rem; }
            p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MunchBear</h1>
        <p id="subtext">We’re cooking up something special.<br>Be the first to know when the bear arrives.</p>
        
        <div class="form-wrapper">
            <div id="form-container">
                <div class="notify-me">
                    <!-- Standard Email Field -->
                    <input type="email" id="email-input" placeholder="Enter your email address" aria-label="Email address" spellcheck="false">
                    
                    <button type="button" id="submit-btn">Notify Me</button>

                    <!-- Cloudflare Turnstile Widget -->
                    <div id="captcha-box" class="captcha-container">
                        <div class="cf-turnstile" data-sitekey="0x4AAAAAADUv6Jla6kjy8P29" data-callback="onTurnstileSuccess"></div>
                    </div>

                    <!-- Honeypot (Invisible to humans) -->
                    <div class="hp-field">
                        <input type="text" id="hp-name" tabindex="-1" autocomplete="off">
                    </div>
                </div>
                <div id="thank-you-msg" class="thank-you">
                    Thank you! We'll be in touch soon.
                </div>
            </div>
        </div>
    </div>

    <script>
        const submitBtn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('email-input');
        const captchaBox = document.getElementById('captcha-box');
        const notifyMe = document.querySelector('.notify-me');
        const thankYouMsg = document.getElementById('thank-you-msg');
        const subtext = document.getElementById('subtext');
        const hpField = document.getElementById('hp-name');

        let turnstileToken = null;

        // Callback when Turnstile finishes verification
        window.onTurnstileSuccess = function(token) {
            turnstileToken = token;
        };

        // Robust Email Regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Show CAPTCHA when email looks valid
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('invalid');
            if (emailRegex.test(emailInput.value)) {
                captchaBox.style.display = 'block';
            }
        });

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const honeypot = hpField.value;

            // 1. Honeypot check
            if (honeypot) return;

            // 2. Email Validation
            if (!emailRegex.test(email)) {
                emailInput.classList.add('invalid');
                emailInput.focus();
                return;
            }

            // 3. CAPTCHA Check (Turnstile)
            if (!turnstileToken) {
                alert('Please complete the security check.');
                return;
            }

            // Google Form Details
            const formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSdcggGPSa-uoVlCwOvCfr3nad5mcDod63HcoI_rRXuMDb_zhQ/formResponse';
            const entryId = 'entry.1937874105';

            const formData = new FormData();
            formData.append(entryId, email);

            submitBtn.disabled = true;
            submitBtn.innerText = 'Verifying...';

            try {
                await fetch(formUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                // Success UI
                notifyMe.style.display = 'none';
                thankYouMsg.style.display = 'block';
                subtext.innerText = "You're on the list!";
            } catch (error) {
                console.error('Submission error:', error);
                notifyMe.style.display = 'none';
                thankYouMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
