<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MunchBear | Coming Soon</title>
    <link rel="icon" type="image/png" href="favicon/favicon-colored-transparent.png">
    <!-- Cloudflare Turnstile Script -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #0f172a;
            --accent-color: #4f46e5;
            --secondary-color: #475569;
            --error-color: #ef4444;
            --success-color: #10b981;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        p {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--secondary-color);
            margin-bottom: 2.5rem;
        }

        .form-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            text-align: left;
            position: relative; /* Anchor for absolute children */
        }

        .input-group {
            display: flex;
            flex-direction: row;
            gap: 12px;
            align-items: center;
            width: 100%;
        }

        input {
            flex: 1;
            min-width: 0;
            height: 46px;
            padding: 0 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #f8fafc;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            background-color: white;
        }

        input.invalid {
            border-color: var(--error-color);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .error-message {
            display: none;
            position: absolute;
            top: 50px; /* Positioned right below the input/button row */
            left: 0;
            color: var(--error-color);
            font-size: 0.85rem;
            font-weight: 500;
            padding-left: 4px;
            width: 100%;
            z-index: 10;
        }

        .captcha-container {
            display: block;
            position: absolute;
            top: 73px; /* Positioned below the error message */
            left: 0;
            width: 100%;
            min-height: 65px;
            z-index: 5;
            overflow: hidden;
        }

        button {
            height: 42.5px;
            padding: 0 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1), 0 2px 4px -1px rgba(79, 70, 229, 0.06);
            white-space: nowrap;
        }

        button:hover {
            background-color: #4338ca;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.2), 0 4px 6px -2px rgba(79, 70, 229, 0.1);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .thank-you {
            display: none;
            height: 46px;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--accent-color);
            font-weight: 600;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        /* Honeypot - Hidden from humans */
        .hp-field {
            position: absolute;
            left: -5000px;
            top: -5000px;
        }

        .fade-out {
            animation: fadeOut 0.3s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.25rem; }
            p { font-size: 1.1rem; }
            .input-group {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
            .error-message {
                top: 104.5px;
            }
            .captcha-container {
                top: 129.5px;
            }
            .thank-you {
                height: 100.5px; /* Matches the taller stacked form on mobile (46+12+42.5) */
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MunchBear</h1>
        <p id="subtext">We’re cooking up something special.<br>Be the first to know when the bear arrives.</p>
        
        <div class="form-wrapper">
            <form id="waitlist-form">
                <!-- Main Input Row -->
                <div class="input-group" id="notify-me-row">
                    <input type="email" id="email-input" placeholder="Enter your email address" aria-label="Email address" spellcheck="false" required>
                    <button type="submit" id="submit-btn">Notify Me</button>
                    
                    <!-- Honeypot (Invisible to humans) -->
                    <div class="hp-field" aria-hidden="true">
                        <input type="text" id="hp-name" tabindex="-1" autocomplete="off">
                    </div>
                </div>

                <!-- Error and Captcha (Absolutely positioned) -->
                <div id="error-msg" class="error-message" role="alert"></div>
                <div id="captcha-box" class="captcha-container">
                    <div class="cf-turnstile" data-sitekey="0x4AAAAAADUv6Jla6kjy8P29" data-callback="onTurnstileSuccess" data-theme="light" data-size="flexible" data-appearance="interaction-only"></div>
                </div>

                <div id="thank-you-msg" class="thank-you" aria-live="polite">
                    Thank you! You're on the list.
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('waitlist-form');
        const submitBtn = document.getElementById('submit-btn');
        const emailInput = document.getElementById('email-input');
        const errorMsg = document.getElementById('error-msg');
        const captchaBox = document.getElementById('captcha-box');
        const notifyMeRow = document.getElementById('notify-me-row');
        const thankYouMsg = document.getElementById('thank-you-msg');
        const subtext = document.getElementById('subtext');
        const hpField = document.getElementById('hp-name');

        // Check for returning users who already submitted
        window.addEventListener('load', () => {
            if (localStorage.getItem('munchbear_waitlist_form_submitted') === 'true') {
                notifyMeRow.style.display = 'none';
                captchaBox.style.display = 'none';
                thankYouMsg.style.display = 'flex';
            } else {
                form.reset();
            }
        });

        let turnstileToken = null;

        // Callback when Turnstile finishes verification
        window.onTurnstileSuccess = function(token) {
            turnstileToken = token;
            errorMsg.style.display = 'none';
        };

        // Robust Email Regex
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // Handle input changes
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('invalid');
            errorMsg.style.display = 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const honeypot = hpField.value;

            // 1. Honeypot check
            if (honeypot) return;

            // 2. Email Validation
            if (!emailRegex.test(email)) {
                emailInput.classList.add('invalid');
                errorMsg.innerText = 'Please enter a valid email address.';
                errorMsg.style.display = 'block';
                emailInput.focus();
                return;
            }

            // 3. CAPTCHA Check (Turnstile)
            if (!turnstileToken) {
                errorMsg.innerText = 'Please complete the security check.';
                errorMsg.style.display = 'block';
                return;
            }

            // Google Form Details
            const formUrl = 'https://docs.google.com/forms/d/e/1FAIpQLSdcggGPSa-uoVlCwOvCfr3nad5mcDod63HcoI_rRXuMDb_zhQ/formResponse';
            const entryId = 'entry.1937874105';

            const formData = new FormData();
            formData.append(entryId, email);

            submitBtn.disabled = true;
            submitBtn.innerText = 'Verifying...';

            try {
                await fetch(formUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });

                // Mark as submitted for returning visits
                localStorage.setItem('munchbear_waitlist_form_submitted', 'true');

                // Smooth Transition to Success UI
                notifyMeRow.classList.add('fade-out');
                captchaBox.classList.add('fade-out');
                errorMsg.style.display = 'none';

                setTimeout(() => {
                    notifyMeRow.style.display = 'none';
                    captchaBox.style.display = 'none';
                    thankYouMsg.style.display = 'flex';
                }, 300); // Matches fadeOut animation duration
            } catch (error) {
                console.error('Submission error:', error);
                // Mark as submitted even on fallback to keep UI consistent
                localStorage.setItem('munchbear_waitlist_form_submitted', 'true');
                // Fallback success UI
                notifyMeRow.style.display = 'none';
                captchaBox.style.display = 'none';
                thankYouMsg.style.display = 'flex';
            } finally {
                // Security best practice: Reset Turnstile token
                if (window.turnstile) turnstile.reset();
            }
        });
    </script>
</body>
</html>
